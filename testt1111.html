\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germany Babyyy 🇩🇪</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Permanent+Marker&family=Short+Stack&display=swap');

        /* --- THE ULTIMATE WHITEBOARD CANVAS --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0ede6;
            /* A louder blueprint grid pattern */
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Short Stack', cursive, sans-serif;
            color: #111;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- FIRST PAGE: THE UNHINGED PROLOGUE --- */
        .parsi {
            width: 100%;
            height: 100vh;
            background-image: url('p.avif');
            background-size: cover;
            background-position: center;
            background-color: #9ec1db; /* Sky match */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .parsi-text {
            background-color: rgba(255, 255, 255, 0.92); 
            color: #222;
            padding: 40px;
            text-align: center;
            border-radius: 4px;
            max-width: 600px;
            box-shadow: 5px 5px 0px #000; /* Retro comic-style flat shadow */
            border: 3px solid #000;
            transform: rotate(-1.5deg);
        }

        .parsi-text h1 {
            font-family: 'Permanent Marker', sans-serif;
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            color: #e63946;
            text-shadow: 2px 2px 0px #000;
        }

        .parsi-text h2 {
            font-size: 1.3rem;
            line-height: 1.5;
            margin: 0 0 25px 0;
            font-weight: normal;
        }

        .parsi-text p {
            font-family: 'Permanent Marker', sans-serif;
            font-size: 1.1rem;
            color: #1d3557;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        /* --- DRAGGABLE PLAYGROUND --- */
        .desk-workspace {
            position: relative;
            width: 100%;
            min-height: 160vh;
            padding: 60px 0;
            box-sizing: border-box;
        }

        .workspace-banner {
            text-align: center;
            margin-bottom: 40px;
            transform: rotate(1deg);
        }

        .workspace-banner h2 {
            font-family: 'Permanent Marker', sans-serif;
            font-size: 3.5rem;
            color: #1d3557;
            margin: 0;
            display: inline-block;
            background: #ffda79;
            padding: 5px 20px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
        }

        /* --- OBJECT STYLING: STICKY NOTES & POLAROIDS --- */
        .interactive-node {
            position: absolute;
            cursor: grab;
            touch-action: none;
            transition: box-shadow 0.1s;
        }

        .interactive-node:active {
            cursor: grabbing;
        }

        /* Polaroid Element */
        .polaroid-frame {
            background: #fff;
            padding: 12px 12px 35px 12px;
            border: 2px solid #000;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
        }

        .polaroid-frame img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            display: block;
            pointer-events: none;
            border: 2px solid #000;
        }

        /* Caption scribbled right on the Polaroid bottom line */
        .polaroid-caption {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            text-align: center;
            margin-top: 8px;
            color: #333;
        }

        /* Fun, Colorful Neon Sticky Notes */
        .journal-card {
            padding: 25px;
            width: 260px;
            border: 2px solid #000;
            box-shadow: 5px 5px 0px #000;
            position: relative;
        }

        /* Neon variations */
        .neon-yellow { background: #fffa65; }
        .neon-pink { background: #ff7675; color: #fff; }
        .neon-blue { background: #74b9ff; }

        /* Jagged Neon Duct Tape Components */
        .node-tape {
            position: absolute;
            top: -18px;
            left: 30%;
            width: 100px;
            height: 25px;
            background: rgba(255, 118, 117, 0.7);
            border-left: 2px dashed rgba(0,0,0,0.3);
            border-right: 2px dashed rgba(0,0,0,0.3);
            transform: rotate(-2deg);
        }
        .tape-blue { background: rgba(116, 185, 255, 0.7); }

        /* Hilarious Custom Stickers inspired by your collage image */
        .sticker {
            position: absolute;
            font-family: 'Permanent Marker', sans-serif;
            font-size: 0.9rem;
            padding: 6px 10px;
            border: 2px dashed #000;
            border-radius: 50%;
            text-transform: uppercase;
            z-index: 5;
            background: #fff;
            color: #000;
        }
        .sticker-1 { top: -15px; right: -15px; background: #badc58; transform: rotate(15deg); }
        .sticker-2 { bottom: -15px; left: -10px; background: #ffbe76; transform: rotate(-10deg); }

        .journal-card h3 {
            margin: 0 0 10px 0;
            font-family: 'Permanent Marker', sans-serif;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .journal-card p {
            margin: 0;
            font-size: 1.05rem;
            line-height: 1.4;
            font-family: 'Short Stack', sans-serif;
        }

        /* --- INITIAL CHAOTIC OVERLAPPING COORDINATES --- */
        #photo-castle { top: 150px; left: 15%; }
        #note-castle  { top: 220px; left: 32%; } /* Intentionally overlapping the castle photo! */

        #photo-berlin { top: 520px; left: 50%; }
        #note-berlin  { top: 580px; left: 28%; }

        #photo-forest { top: 900px; left: 20%; }
        #note-forest  { top: 960px; left: 42%; }

        /* --- RESPONSIVE FALLBACK FOR MOBILE --- */
        @media (max-width: 850px) {
            .parsi-text { margin: 20px; padding: 25px; }
            .desk-workspace { display: flex; flex-direction: column; align-items: center; gap: 40px; min-height: auto; padding: 40px 20px; }
            .interactive-node { position: relative !important; top: auto !important; left: auto !important; transform: none !important; cursor: default; }
            .polaroid-frame { width: 90%; max-width: 300px; box-sizing: border-box; }
            .polaroid-frame img { width: 100%; height: auto; }
            .journal-card { width: 90%; max-width: 260px; box-sizing: border-box; }
            .node-tape { display: none; }
        }
    </style>
</head>
<body>

    <section class="parsi">
        <div class="parsi-text">
            <h1>NVM</h1>
            <h2>It was supposed to be at last but it was the first pic in myy downloads , soo yeahh ( It is also a nicee destination, hehe)</h2>
            <p>👇 SCROLL DOWN FOR GERMANYY BABYYYYY 👇</p>
        </div>
    </section>

    <main class="desk-workspace">
        <div class="workspace-banner">
            <h2>GERMANY ROADTRIP GRID 🇩🇪✨</h2>
        </div>

        <div class="interactive-node polaroid-frame" id="photo-castle" data-rot="-7">
            <img src="https://images.unsplash.com/photo-1508849789987-4e5333c12b78?auto=format&fit=crop&w=600&q=80" alt="Neuschwanstein">
            <div class="polaroid-caption">Looks fake but ok 🏰</div>
        </div>
        <div class="interactive-node journal-card neon-yellow" id="note-castle" data-rot="5">
            <div class="node-tape"></div>
            <div class="sticker sticker-1">100% Legit</div>
